<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEDICTIME - Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <!-- Header simple -->
  <header class="bg-white shadow-sm">
    <nav class="navbar navbar-expand-lg navbar-light container align-items-center">
      <a class="navbar-brand" href="index.html">
        <img src="https://i.imgur.com/100lvlZ.png" alt="MEDICTIME Logo" class="navbar-logo">
      </a>
    </nav>
  </header>

  <!-- Login Form -->
  <section class="login-section d-flex justify-content-center align-items-center">
    <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
      <h3 class="text-center mb-4">Iniciar Sesión</h3>
      <form id="loginForm">
        <div class="mb-3">
          <label for="usuario" class="form-label">Rut</label>
          <input type="text" class="form-control" id="rut" placeholder="Ej: 12345678-9" required>
        </div>

        <!-- Enlace ¿Has olvidado tu contraseña? -->
        <div class="mb-1 text-end">
          <a href="recuperar.html" class="text-primary text-decoration-none">¿Has olvidado tu contraseña?</a>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Ingresar</button>

        <div class="mt-3 text-center">
          <a href="registro.html">¿No tienes cuenta? Regístrate</a>
        </div>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-auto">
    <p class="mb-2">&copy; 2025 MEDICTIME | Mejorando la salud de Chile desde 1972</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- JS personalizado -->
  <script src="js/login.js"></script>
</body>
</html>
