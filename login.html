<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio de Sesión - MedicTime</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-dark text-white">

  <!-- Fondo con imagen -->
  <div class="position-fixed top-0 start-0 w-100 h-100" style="
    background-image: url('https://3.bp.blogspot.com/-6P-3DJzTg5s/V_Q8pJndQKI/AAAAAAAAAAU/s019Wmrmn_Mu5x2SwGLtwHD29-Ic46x2ACLcB/w1200-h630-p-k-no-nu/Medicina2.jpg');
    background-size: cover;
    background-position: center;
    z-index: -1;
    opacity: 0.3;">
  </div>

  <!-- Contenedor -->
  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow w-100" style="max-width: 450px;">
      <div class="card-body">

        <!-- Logo -->
        <div class="text-center mb-3">
          <img src="https://3.bp.blogspot.com/-6P-3DJzTg5s/V_Q8pJndQKI/AAAAAAAAAAU/s019Wmrmn_Mu5x2SwGLtwHD29-Ic46x2ACLcB/w1200-h630-p-k-no-nu/Medicina2.jpg" alt="Logo" />
 
            alt="Logo MedicTime" 
            class="img-fluid"
            style="max-height: 60px;">
        </div>

        <!-- Título -->
        <h5 class="text-center text-primary">Bienvenido a MedicTime</h5>
        <p class="text-center text-muted mb-4">Ingresa tus datos para continuar</p>

        <!-- Formulario -->
        <form id="loginForm" novalidate>

          <!-- Usuario o Clave Única -->
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Usuario / Clave Única</label>
            <input type="text" class="form-control" id="loginEmail" placeholder="correo@ejemplo.com o Clave Unica" required>
            <div class="invalid-feedback">Este campo es obligatorio.</div>
          </div>

          <!-- Contraseña -->
          <div class="mb-3">
            <label for="loginPassword" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="loginPassword" placeholder="Contraseña" required>
            <div class="invalid-feedback">Ingresa tu contraseña.</div>
          </div>

          <!-- Recordarme -->
          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Recordarme</label>
          </div>

          <!-- Botón -->
          <div class="d-grid mb-2">
            <button type="submit" class="btn btn-primary">Ingresar</button>
          </div>

          <!-- Enlace a recuperar contraseña -->
          <div class="text-center">
            <a href="#" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
          </div>

        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
