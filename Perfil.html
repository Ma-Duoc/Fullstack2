<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil de Usuario - MedicTime</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-dark text-white">

  <!-- Fondo -->
  <div class="position-fixed top-0 start-0 w-100 h-100" style="
    background-image: url('https://img.freepik.com/foto-gratis/doctor-sosteniendo-carpeta-azul-estetoscopio_1150-18914.jpg');
    background-size: cover;
    background-position: center;
    z-index: -1;
    opacity: 0.3;">
  </div>

  <!-- Contenedor -->
  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow w-100" style="max-width: 600px;">
      <div class="card-body">

        <!-- Título -->
        <h4 class="text-center text-primary mb-4">Perfil de Usuario</h4>

        
        <form id="perfilForm" novalidate>
          <div class="row">
            <!-- Nombre -->
            <div class="col-md-6 mb-3">
              <label for="nombre" class="form-label">Nombre completo</label>
              <input type="text" class="form-control" id="nombre" placeholder="Juan Pérez" required>
              <div class="invalid-feedback">Por favor ingresa tu nombre.</div>
            </div>

            <!-- Correo -->
            <div class="col-md-6 mb-3">
              <label for="correo" class="form-label">Correo electrónico</label>
              <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com" required>
              <div class="invalid-feedback">Ingresa un correo válido.</div>
            </div>
          </div>

          <div class="row">
            <!-- Teléfono -->
            <div class="col-md-6 mb-3">
              <label for="telefono" class="form-label">Teléfono</label>
              <input type="tel" class="form-control" id="telefono" placeholder="+56 9 1234 5678" required>
              <div class="invalid-feedback">Ingresa un número de teléfono válido.</div>
            </div>

            <!-- Dirección -->
            <div class="col-md-6 mb-3">
              <label for="direccion" class="form-label">Dirección</label>
              <input type="text" class="form-control" id="direccion" placeholder="Av. Siempre Viva 742" required>
              <div class="invalid-feedback">La dirección es obligatoria.</div>
            </div>
          </div>

          <!-- Cambiar Contraseña -->
          <h6 class="text-primary mt-4">Cambiar Contraseña</h6>
          <div class="mb-3">
            <label for="nuevaPassword" class="form-label">Nueva contraseña</label>
            <input type="password" class="form-control" id="nuevaPassword" placeholder="********">
            <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
          </div>

          <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="********">
            <div class="invalid-feedback">Las contraseñas no coinciden.</div>
          </div>

          <!-- Botón -->
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="perfil.js"></script>
</body>
</html>
