<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

  <!-- Fondo con imagen -->
  <div class="position-fixed top-0 start-0 w-100 h-100" style="
    background-image: url('https://i.imgur.com/100lvlZ.png');
    background-size: cover;
    background-position: center;
    z-index: -1;
    opacity: 0.3;">
  </div>

  <!-- Contenedor centrado -->
  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="card text-dark shadow w-100" style="max-width: 500px;">
      <div class="card-body">
        <h4 class="text-center text-primary mb-4">Registro</h4>
        <form id="registroForm" novalidate>
          
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan Pérez" required>
            <div class="invalid-feedback">El nombre es obligatorio.</div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
            <div class="invalid-feedback">Por favor, ingresa un correo válido.</div>
          </div>

          <div class="mb-3">
            <label for="rut" class="form-label">RUT</label>
            <input type="text" class="form-control" id="rut" placeholder="Ej: 12345678-9" required>
            <div class="invalid-feedback">Ingrese un RUT válido (formato: 12345678-9).</div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Mínimo 8 caracteres" required>
            <div class="invalid-feedback">La contraseña debe tener al menos 8 caracteres, incluir mayúsculas, minúsculas y números.</div>
          </div>

          <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Repite la contraseña" required>
            <div class="invalid-feedback">Las contraseñas no coinciden.</div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Registrarse</button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Validación Bootstrap
    (() => {
      const form = document.getElementById('registroForm');
      form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
          event.preventDefault();
          event.stopPropagation();
        }
        form.classList.add('was-validated');
      });
    })();
  </script>
</body>
</html>
