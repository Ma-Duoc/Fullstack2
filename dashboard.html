<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - MedicTime</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
    <div class="ms-auto">
      <a href="#" class="btn btn-outline-light">Cerrar Sesión</a>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <!-- Sidebar -->
      <nav class="col-md-3 col-lg-2 d-md-block bg-primary sidebar collapse min-vh-100">
        <div class="position-sticky pt-3 text-white">
          <h4 class="text-center py-3 border-bottom">MedicTime</h4>
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-house-door me-2"></i>Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-calendar-check me-2"></i>Mis Citas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-calendar-plus me-2"></i>Agendar Cita</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-person-badge me-2"></i>Médicos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-heart-pulse me-2"></i>Especialidades</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-clock-history me-2"></i>Historial</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-gear me-2"></i>Configuración</a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Contenido principal -->
      <main class="col-md-9 col-lg-10 p-4">
        <div class="card shadow-lg border-0">
          <div class="card-body bg-primary text-white rounded">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <h4 class="fw-bold">Perfil MedicTime</h4>
                <p class="mb-1" id="nombreDisplay">Cristian Pizarro Bahamondes</p>
              </div>
              <div>
                <button class="btn btn-light btn-sm">
                  <i class="bi bi-camera"></i> Subir foto
                </button>
              </div>
            </div>

            <hr class="border-light">


            <div id="datosDisplay">
              <div class="mb-3">
                <p class="mb-1 fw-bold">Email</p>
                <p class="mb-0" id="emailDisplay">cristianbahamondes66@gmail.com</p>
              </div>

              <div class="mb-3">
                <p class="mb-1 fw-bold">Teléfono</p>
                <p class="mb-0" id="telefonoDisplay">+56 9 1234 5678</p>
              </div>

              <button class="btn btn-light fw-bold" onclick="mostrarFormulario()">Editar</button>
            </div>

            <form id="formEditar" style="display: none;" onsubmit="guardarCambios(event)">
              <div class="mb-3">
                <label class="form-label fw-bold text-white">Nombre</label>
                <input type="text" class="form-control" id="nombreInput" value="Cristian Pizarro Bahamondes">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold text-white">Email</label>
                <input type="email" class="form-control" id="emailInput" value="cristianbahamondes66@gmail.com">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold text-white">Teléfono</label>
                <input type="text" class="form-control" id="telefonoInput" value="+56 9 1234 5678">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold text-white">Contraseña</label>
                <input type="password" class="form-control" id="contrasenaInput" placeholder="Nueva contraseña">
              </div>

              <button type="submit" class="btn btn-light fw-bold">Guardar</button>
              <button type="button" class="btn btn-secondary fw-bold ms-2" onclick="cancelarEdicion()">Cancelar</button>
            </form>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script>
    function mostrarFormulario() {
      document.getElementById("formEditar").style.display = "block";
      document.getElementById("datosDisplay").style.display = "none";
    }

    function cancelarEdicion() {
      document.getElementById("formEditar").style.display = "none";
      document.getElementById("datosDisplay").style.display = "block";
    }

    function guardarCambios(event) {
      event.preventDefault();


      const nombre = document.getElementById("nombreInput").value;
      const email = document.getElementById("emailInput").value;
      const telefono = document.getElementById("telefonoInput").value;
      const contrasena = document.getElementById("contrasenaInput").value;


      document.getElementById("nombreDisplay").textContent = nombre;
      document.getElementById("emailDisplay").textContent = email;
      document.getElementById("telefonoDisplay").textContent = telefono;

      cancelarEdicion();
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
