<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - MedicTime</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

 
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
    <div class="ms-auto">
      <a href="#" class="btn btn-outline-light">Cerrar Sesión</a>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">

      
      <nav class="col-md-3 col-lg-2 d-md-block bg-primary sidebar collapse min-vh-100">
        <div class="position-sticky pt-3 text-white text-center">
          <div class="py-3 border-bottom">
            <img src="https://i.imgur.com/100lvlZ.png" alt="MedicTime Logo" class="img-fluid" style="max-width: 120px;">
          </div>
          <ul class="nav flex-column mt-3">
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-house-door me-2"></i>Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-calendar-plus me-2"></i>Citas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#"><i class="bi bi-clock-history me-2"></i>Historial</a>
            </li>
          </ul>
        </div>
      </nav>

    
      <main class="col-md-9 col-lg-10 p-4">
        <div class="card shadow-lg border-0">
          <div class="card-body bg-primary text-white rounded">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <h4 class="fw-bold">Perfil MedicTime</h4>
                <p class="mb-1" id="nombreDisplay">Cristian Pizarro Bahamondes</p>
              </div>
              <div>
                <button class="btn btn-light btn-sm">
                  <i class="bi bi-camera"></i> Subir foto
                </button>
              </div>
            </div>

            <div class="mb-3">
              <p class="mb-1 fw-bold">RUT</p>
              <p class="mb-0" id="rutDisplay">12.345.678-9</p>
            </div>

            <hr class="border-light">

            <div id="datosDisplay">
              <div class="mb-3">
                <p class="mb-1 fw-bold">Email</p>
                <p class="mb-0" id="emailDisplay">cristianbahamondes66@gmail.com</p>
              </div>

              <div class="mb-3">
                <p class="mb-1 fw-bold">Teléfono</p>
                <p class="mb-0" id="telefonoDisplay">+56 9 1234 5678</p>
              </div>

              <button class="btn btn-light fw-bold" onclick="mostrarFormulario()">Editar</button>
            </div>

            <form id="formEditar" style="display: none;" onsubmit="guardarCambios(event)">
              <div class="mb-3">
                <label class="form-label fw-bold text-white">Nombre</label>
                <input type="text" class="form-control" id="nombreInput">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold text-white">Email</label>
                <input type="email" class="form-control" id="emailInput">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold text-white">Teléfono</label>
                <input type="text" class="form-control" id="telefonoInput">
              </div>

              <button type="submit" class="btn btn-light fw-bold">Guardar</button>
              <button type="button" class="btn btn-secondary fw-bold ms-2" onclick="cancelarEdicion()">Cancelar</button>
            </form>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script src="js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
