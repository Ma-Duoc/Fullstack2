<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEDICTIME - Restablecer Contraseña</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light">

  
  <div id="notification" class="card text-white bg-success text-center position-fixed top-0 start-50 translate-middle-x shadow-sm" style="display:none; z-index:1050; max-width:400px;">
    <div class="card-body p-2">
      ✅ El correo ha sido enviado con éxito.
    </div>
  </div>

  
  <section class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-sm p-4" style="max-width: 450px; width: 100%;">

      
      <div class="text-center mb-4">
        <img src="https://i.imgur.com/100lvlZ.png" alt="MEDICTIME Logo" class="img-fluid" style="max-height: 80px;">
      </div>

      
      <h2 class="text-center mb-3">Restablecer su contraseña</h2>

     
      <p class="text-center text-muted mb-4">
        Ingrese la dirección de correo electrónico verificada de su cuenta de usuario y le enviaremos un enlace para restablecer su contraseña.
      </p>

      
      <form id="resetForm">
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
          <div class="invalid-feedback">Por favor, ingrese un correo válido.</div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Enviar correo</button>
      </form>


    </div>
  </section>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/recuperar.js"></script>
</body>
</html>
